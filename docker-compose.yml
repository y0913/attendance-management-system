services:
  postgres:
    image: postgres:17-alpine
    container_name: ams_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ams
      POSTGRES_PASSWORD: ams_dev
      POSTGRES_DB: ams
    ports:
      - '5433:5432'
    volumes:
      - ams_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ams -d ams']
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: ams_mailpit
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    environment:
      MP_MAX_MESSAGES: '500'

volumes:
  ams_postgres_data:
